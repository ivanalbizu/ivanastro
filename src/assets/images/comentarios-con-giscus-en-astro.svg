<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="1200" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a20000"/>
      <stop offset="100%" style="stop-color:#cc2222"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.4"/>
  </pattern>
  <rect width="1200" height="450" fill="url(#grid)" opacity="0.4"/>

  <!-- TITLE -->
  <rect x="360" y="12" width="480" height="56" rx="8" fill="#000" opacity="0.35"/>
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Comentarios con Giscus</text>
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">GitHub Discussions como sistema de comentarios en Astro</text>

  <!-- LEFT CARD: Astro component (x=100, w=310) -->
  <g transform="translate(100, 82)">
    <rect width="310" height="280" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="310" height="36" rx="10" fill="#21262d"/>
    <rect y="26" width="310" height="10" fill="#21262d"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e"/>
    <circle cx="54" cy="18" r="5" fill="#28c840"/>
    <text x="155" y="23" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Comments.astro</text>

    <!-- Code -->
    <text x="16" y="62" font-family="monospace" font-size="11" fill="#7ee787">&lt;section id="comments"&gt;</text>
    <text x="28" y="78" font-family="monospace" font-size="11" fill="#7ee787">  &lt;div class="giscus"&gt;&lt;/div&gt;</text>
    <text x="16" y="94" font-family="monospace" font-size="11" fill="#7ee787">&lt;/section&gt;</text>

    <text x="16" y="118" font-family="monospace" font-size="11" fill="#f78166">&lt;script is:inline&gt;</text>
    <text x="28" y="134" font-family="monospace" font-size="11" fill="#79c0ff">  IntersectionObserver</text>
    <text x="36" y="150" font-family="monospace" font-size="11" fill="#484f58">  // lazy load</text>
    <text x="28" y="168" font-family="monospace" font-size="11" fill="#79c0ff">  theme-changed event</text>
    <text x="36" y="184" font-family="monospace" font-size="11" fill="#484f58">  // toggle manual</text>
    <text x="28" y="202" font-family="monospace" font-size="11" fill="#79c0ff">  matchMedia.change</text>
    <text x="36" y="218" font-family="monospace" font-size="11" fill="#484f58">  // preferencia OS</text>
    <text x="16" y="238" font-family="monospace" font-size="11" fill="#f78166">&lt;/script&gt;</text>

    <!-- Badges -->
    <rect x="12" y="254" width="134" height="18" rx="9" fill="#1f3a1f"/>
    <text x="79" y="267" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3fb950">⚡ Zero LCP impact</text>
    <rect x="154" y="254" width="144" height="18" rx="9" fill="#1a2a3a"/>
    <text x="226" y="267" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#79c0ff">🎨 Theme sync</text>
  </g>

  <!-- CENTER: Connector + Giscus logo (x=410 to x=790) -->
  <g>
    <!-- Left arrow -->
    <line x1="412" y1="222" x2="505" y2="222" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="505,215 519,222 505,229" fill="#30363d"/>

    <!-- Giscus diamond (centered at x=600) -->
    <g transform="translate(600, 200)" filter="url(#glow)">
      <polygon points="0,-44 44,0 0,44 -44,0" fill="none" stroke="url(#blueGrad)" stroke-width="2.5"/>
      <polygon points="0,-34 34,0 0,34 -34,0" fill="url(#blueGrad)" opacity="0.12"/>
      <text x="0" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="800" fill="#388bfd">giscus</text>
      <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">powered by</text>
      <text x="0" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">GitHub</text>
    </g>

    <!-- postMessage label -->
    <rect x="535" y="254" width="130" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="600" y="269" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">postMessage(theme)</text>

    <!-- Right arrow -->
    <line x1="681" y1="222" x2="774" y2="222" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="774,215 788,222 774,229" fill="#30363d"/>
  </g>

  <!-- RIGHT CARD: GitHub Discussions (x=790, w=310) -->
  <g transform="translate(790, 82)">
    <rect width="310" height="280" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="310" height="42" rx="10" fill="#21262d"/>
    <rect y="32" width="310" height="10" fill="#21262d"/>
    <circle cx="21" cy="21" r="11" fill="#30363d"/>
    <text x="21" y="26" text-anchor="middle" font-family="system-ui" font-size="13" fill="#e6edf3">⌥</text>
    <text x="90" y="16" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">GitHub Discussions</text>
    <text x="90" y="32" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Categoría: Comentarios</text>

    <!-- Comment 1 -->
    <g transform="translate(14, 58)">
      <circle cx="14" cy="14" r="12" fill="url(#redGrad)"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#fff">iv</text>
      <rect x="32" y="0" width="250" height="52" rx="6" fill="#21262d"/>
      <text x="44" y="16" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">ivanalbizu</text>
      <text x="44" y="30" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Propietario · hace 2 días</text>
      <text x="44" y="46" font-family="system-ui, sans-serif" font-size="11" fill="#c9d1d9">Comentario de prueba 🎉</text>
    </g>

    <!-- Comment 2 -->
    <g transform="translate(14, 122)">
      <circle cx="14" cy="14" r="12" fill="#1f6feb"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#fff">U</text>
      <rect x="32" y="0" width="250" height="52" rx="6" fill="#21262d"/>
      <text x="44" y="16" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">usuario</text>
      <text x="44" y="30" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">hace 1 día</text>
      <text x="44" y="46" font-family="system-ui, sans-serif" font-size="11" fill="#c9d1d9">Muy útil, gracias!</text>
    </g>

    <!-- Reply input -->
    <g transform="translate(14, 188)">
      <rect width="282" height="34" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="12" y="22" font-family="system-ui, sans-serif" font-size="11" fill="#484f58">Escribe un comentario...</text>
    </g>

    <!-- Reactions -->
    <g transform="translate(14, 234)">
      <rect width="62" height="22" rx="11" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="31" y="16" text-anchor="middle" font-family="system-ui" font-size="11" fill="#e6edf3">👍 3</text>
      <rect x="70" y="0" width="62" height="22" rx="11" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="101" y="16" text-anchor="middle" font-family="system-ui" font-size="11" fill="#e6edf3">🎉 1</text>
      <text x="144" y="16" font-family="system-ui, sans-serif" font-size="10" fill="#484f58">— Powered by Giscus</text>
    </g>

    <!-- Theme pills -->
    <g transform="translate(14, 264)">
      <rect width="72" height="10" rx="5" fill="#a20000" opacity="0.8"/>
      <text x="36" y="9" text-anchor="middle" font-family="system-ui" font-size="7" fill="#fff">dark_dimmed</text>
      <rect x="80" y="0" width="48" height="10" rx="5" fill="#f0f6fc" opacity="0.25"/>
      <text x="104" y="9" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ccc">light</text>
    </g>
  </g>

  <!-- BOTTOM BADGES — 5 equally spaced, centers at 150 380 600 820 1050 -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    <g transform="translate(150, 400)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="#ff5d01"/>
      <text y="5" fill="#fff">Astro</text>
    </g>
    <g transform="translate(380, 400)">
      <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#1f6feb"/>
      <text y="5" fill="#fff">Giscus</text>
    </g>
    <g transform="translate(600, 400)">
      <rect x="-74" y="-14" width="148" height="28" rx="14" fill="#238636"/>
      <text y="5" fill="#fff">Discussions</text>
    </g>
    <g transform="translate(820, 400)">
      <rect x="-58" y="-14" width="116" height="28" rx="14" fill="#2d333b" stroke="#30363d" stroke-width="1"/>
      <text y="5" fill="#e6edf3">is:inline</text>
    </g>
    <g transform="translate(1050, 400)">
      <rect x="-56" y="-14" width="112" height="28" rx="14" fill="#6e40c9"/>
      <text y="5" fill="#fff">Lazy Load</text>
    </g>
  </g>
</svg>
